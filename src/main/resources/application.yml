spring:
  application:
    name: ticket-booking-app-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/booking_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:booking_user}
    password: ${SPRING_DATASOURCE_PASSWORD:booking_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Flyway is the source of truth for schema. Hibernate should not
      # validate / create / update the DB. Setting this to 'validate' fails
      # on Hibernate 6 because @Enumerated(EnumType.STRING) now expects
      # MySQL native ENUM(...) columns instead of VARCHAR.
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.bookingplatform: DEBUG
    org.hibernate.SQL: DEBUG
